[pytest]
markers =
    regression: end-to-end regression tests that run the full LLM-powered pipeline
        (requires API keys + PDF fixtures). Run with:
        pytest -m regression
    live: full-pipeline live tests against real LLM (requires GEMINI_API_KEY + PDF).
        Run with: pytest -m live
    mpers_inventory: MPERS generator Phase 1 (role inventory + format-reference pins)
    mpers_generator_core: MPERS generator Phase 2 (walker / label resolver / emitter)
    mpers_company: MPERS generator Phase 3 (Company-level xlsx output)
    mpers_formulas: MPERS generator Phase 4 (calc linkbase + SUM formulas)
    mpers_group: MPERS generator Phase 5 (Group-level emitter + 6-col layout)
    mpers_snapshot: MPERS generator Phase 6 (backup-originals snapshot)
    mpers_wiring_registry: MPERS pipeline wiring Phase 1 (registry dual-standard support)
    mpers_wiring_coordinator: MPERS pipeline wiring Phase 2 (coordinator + agent factory plumbing)
    mpers_wiring_server: MPERS pipeline wiring Phase 3 (server API plumbing)
    mpers_wiring_crosschecks: MPERS pipeline wiring Phase 4 (cross-check per-standard gating)
    mpers_wiring_scout: MPERS pipeline wiring Phase 5 (scout standard detection)
    mpers_wiring_prompts: MPERS pipeline wiring Phase 6 (SoRE prompt file)
    mpers_wiring_history: MPERS pipeline wiring Phase 8 (history repository + API)
    mpers_wiring_e2e: MPERS pipeline wiring Phase 9 (end-to-end + docs)

# Exclude regression and live tests by default so a plain `pytest` never triggers
# expensive LLM calls.  Run them explicitly:
#     pytest -m regression
#     pytest -m live
# or run everything including all markers:
#     pytest -m ""
addopts = -m "not regression and not live"
