<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <style>
      .case { fill: #E8E4D9; }
      .case-dark { fill: #C4C0B6; }
      .screen { fill: #1E252B; }
      .eye { fill: #2ECC71; }
      .thruster { fill: #7F8C8D; }
      .shadow { fill: #EAEAEA; }
      .blush { fill: #FF8A8A; }
      
      .squish { animation: squish 1.5s infinite steps(2, end); }
      .hand-l { animation: hand-bob-l 2.5s infinite ease-in-out; }
      .hand-r { animation: hand-bob-r 2.5s infinite ease-in-out; }
      .blink { animation: eye-blink 4s infinite steps(1); }

      @keyframes squish { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(1px); } }
      @keyframes hand-bob-l { 0%, 100% { transform: translateY(0px) rotate(-10deg); } 50% { transform: translateY(-2px) rotate(-15deg); } }
      @keyframes hand-bob-r { 0%, 100% { transform: translateY(0px) rotate(10deg); } 50% { transform: translateY(-1px) rotate(5deg); } }
      @keyframes eye-blink { 0%, 94%, 100% { opacity: 1; } 95%, 98% { opacity: 0; } }
    </style>
  </defs>
  <g shape-rendering="crispEdges">
    <rect x="8" y="25" width="16" height="1" class="shadow"/>

    <rect x="10" y="24" width="4" height="1" class="thruster"/>
    <rect x="11" y="22" width="2" height="2" class="case-dark"/>
    <rect x="18" y="24" width="4" height="1" class="thruster"/>
    <rect x="19" y="22" width="2" height="2" class="case-dark"/>
    
    <g class="squish">
      <rect x="9" y="8" width="14" height="1" class="case"/>
      <rect x="8" y="9" width="16" height="12" class="case"/>
      <rect x="9" y="21" width="14" height="2" class="case-dark"/>
      <rect x="8" y="21" width="1" height="1" class="case-dark"/>
      <rect x="23" y="21" width="1" height="1" class="case-dark"/>
      
      <rect x="10" y="10" width="12" height="9" class="screen"/>
      <rect x="9" y="11" width="1" height="7" class="screen"/>
      <rect x="22" y="11" width="1" height="7" class="screen"/>
      
      <g class="blink">
        <rect x="12" y="13" width="2" height="3" class="eye"/>
        <rect x="18" y="13" width="2" height="3" class="eye"/>
      </g>
      <rect x="10" y="16" width="2" height="1" class="blush"/>
      <rect x="20" y="16" width="2" height="1" class="blush"/>

      <g class="hand-l" style="transform-origin: 6px 18px">
        <rect x="4" y="17" width="3" height="3" class="case"/>
        <rect x="4" y="20" width="3" height="1" class="case-dark"/>
      </g>
      <g class="hand-r" style="transform-origin: 26px 18px">
        <rect x="25" y="17" width="3" height="3" class="case"/>
        <rect x="25" y="20" width="3" height="1" class="case-dark"/>
      </g>
    </g>
  </g>
</svg>
